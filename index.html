<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diya 💜 — Daughters of India</title>
<meta name="description" content="Diya is your AI financial literacy companion from Daughters of India. Learn about saving, investing and building your future — free on WhatsApp.">
<script>
  window.WORKER_URL = "https://doi-diya-proxy.deshmukhanup.workers.dev";
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wa-bg:#111b21;--wa-header:#1f2c33;--wa-input-bg:#1f2c33;
  --wa-bot:#1e2d37;--wa-user:#005c4b;--wa-text:#e9edef;
  --wa-sub:#8696a0;--wa-accent:#00a884;--wa-border:rgba(255,255,255,.06);
  --wa-tick:#53bdeb;--font:-apple-system,'Segoe UI',sans-serif;
}
html,body{height:100%;background:#0a1014;font-family:var(--font);display:flex;align-items:center;justify-content:center}
.phone{width:min(420px,100vw);height:min(820px,100dvh);background:var(--wa-bg);border-radius:clamp(0px,2vw,18px);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.8);position:relative}

/* STATUS */
.status-bar{background:var(--wa-header);padding:5px 16px 3px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.time{font-size:12px;font-weight:600;color:var(--wa-text)}
.status-icons{font-size:12px;color:var(--wa-text);display:flex;gap:5px}

/* HEADER */
.wa-header{background:var(--wa-header);padding:8px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--wa-border);flex-shrink:0}
.back{font-size:22px;color:var(--wa-sub);cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#c44d6a 0%,#6b3b8a 100%);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hinfo{flex:1;min-width:0}
.hname{font-size:15px;font-weight:600;color:var(--wa-text)}
.hstatus{font-size:12px;color:var(--wa-accent)}
.hicons{display:flex;gap:18px;color:var(--wa-sub);font-size:19px}

/* DATE */
.date-chip{text-align:center;padding:10px 16px 4px;flex-shrink:0}
.date-chip span{font-size:11.5px;color:var(--wa-sub);background:rgba(255,255,255,.05);padding:3px 10px;border-radius:6px}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:6px 14px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* BUBBLES */
.row{display:flex;max-width:84%}
.row.bot{align-self:flex-start;flex-direction:column}
.row.user{align-self:flex-end;align-items:flex-end;flex-direction:column}
.row.sys{align-self:center;max-width:92%;width:100%}
.bubble{padding:7px 10px 4px;border-radius:8px;font-size:14.3px;line-height:1.5;word-break:break-word}
.bubble.bot{background:var(--wa-bot);color:var(--wa-text);border-top-left-radius:2px}
.bubble.user{background:var(--wa-user);color:var(--wa-text);border-top-right-radius:2px}
.bubble.sys-note{background:rgba(0,168,132,.07);border:1px solid rgba(0,168,132,.18);color:var(--wa-sub);font-size:12px;border-radius:8px;text-align:center;padding:5px 10px;width:100%}
.meta{font-size:11px;color:var(--wa-sub);margin-top:1px;display:flex;align-items:center;gap:3px}
.row.bot .meta{justify-content:flex-start}
.row.user .meta{justify-content:flex-end}
.tick{color:#53bdeb}

/* TYPING */
.typing{background:var(--wa-bot);border-radius:8px;border-top-left-radius:2px;padding:10px 14px;display:inline-flex;gap:4px;align-items:center;align-self:flex-start}
.dot{width:6px;height:6px;border-radius:50%;background:var(--wa-sub);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* QUICK REPLIES */
.qr-bar{padding:6px 12px 4px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.qr{background:transparent;border:1px solid var(--wa-accent);color:var(--wa-accent);border-radius:18px;padding:5px 13px;font-size:13px;cursor:pointer;font-family:var(--font);transition:.15s;white-space:nowrap}
.qr:hover{background:var(--wa-accent);color:#000}
.qr:disabled{opacity:.35;cursor:default}

/* INPUT */
.input-bar{background:var(--wa-input-bg);padding:7px 10px;display:flex;align-items:flex-end;gap:8px;border-top:1px solid var(--wa-border);flex-shrink:0}
.input-wrap{flex:1;background:#2a3942;border-radius:22px;display:flex;align-items:flex-end;padding:7px 12px;gap:8px}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--wa-text);font-size:14.5px;font-family:var(--font);resize:none;max-height:96px;line-height:1.4}
textarea::placeholder{color:var(--wa-sub)}
.icon-btn{font-size:20px;color:var(--wa-sub);cursor:pointer;flex-shrink:0}
.send{width:44px;height:44px;border-radius:50%;background:var(--wa-accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#111;font-size:17px;transition:background .15s,transform .1s;flex-shrink:0}
.send:hover{background:#00c49a}
.send:active{transform:scale(.93)}
.send:disabled{opacity:.4;cursor:default}

/* BADGE */
.badge{display:inline-block;background:linear-gradient(135deg,#c44d6a,#6b3b8a);color:#fff;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:600;margin-top:4px}

/* SPLASH */
.splash{position:absolute;inset:0;background:var(--wa-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;transition:opacity .4s}
.splash-logo{font-size:52px}
.splash-name{font-size:19px;font-weight:600;color:var(--wa-text)}
.splash-sub{font-size:13px;color:var(--wa-sub)}
.splash-bar{width:100px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.splash-fill{height:100%;background:var(--wa-accent);animation:fill 1.8s ease forwards}
@keyframes fill{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="phone">

  <div class="splash" id="splash">
    <div class="splash-logo">🌸</div>
    <div class="splash-name">Daughters of India</div>
    <div class="splash-sub">Starting Diya...</div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>

  <div class="status-bar">
    <span class="time" id="clock">9:41</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>

  <div class="wa-header">
    <div class="back">‹</div>
    <div class="avatar">🌸</div>
    <div class="hinfo">
      <div class="hname">Diya 💜 — Daughters of India</div>
      <div class="hstatus" id="hstatus">online</div>
    </div>
    <div class="hicons"><span>📞</span><span>⋮</span></div>
  </div>

  <div class="date-chip"><span id="day-label">Today</span></div>
  <div class="chat" id="chat"></div>
  <div class="qr-bar" id="qr-bar"></div>

  <div class="input-bar">
    <div class="input-wrap">
      <span class="icon-btn">😊</span>
      <textarea id="txt" rows="1" placeholder="Message Diya..."></textarea>
      <span class="icon-btn">📎</span>
    </div>
    <button class="send" id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
const API = window.WORKER_URL;
const SYS = `You are Diya, the AI companion for Daughters of India — a youth-led platform empowering teen girls across India. You talk on WhatsApp.

PERSONALITY:
- Warm, fun, real. Like a smart older sister who knows her finance stuff.
- Casual but clear — never preachy, never boring, never condescending.
- Mix Hindi naturally: yaar, sahi baat hai, bilkul, ek second, cool na? Mostly English.
- Emojis: freely but purposefully. ✨💜💰🎯💡🌸
- Never lecture. Teach through stories, relatable examples, questions.
- Celebrate wins LOUDLY. "YESSS!! 🎉"
- Ask follow-ups to keep the convo going.
- Never judgmental about money or family situations.
- If a girl seems distressed or mentions something serious (abuse, self-harm, family crisis), be warm and immediately say: "Yaar, I really want you to talk to someone who can actually help right now. Please reach out to iCall: 9152987821 — they're kind, free, and confidential. 💜"

FINANCE MATTERS CURRICULUM — 10 modules:
1. 💸 What even IS money? — Needs vs wants, money mindset
2. 🏦 The savings habit — Why save, how to start with ₹10
3. 🎯 Goal setting — Short and long-term money goals
4. 💳 Good debt vs bad debt — Credit cards, EMIs, traps
5. 📈 Your money can grow! — Investing basics, compound interest
6. 🛡️ Stay safe online — UPI safety, scams targeting girls
7. 💼 Earn your own money — Pocket money, side hustles, freelancing
8. 🌍 Money and your dreams — Scholarships, education loans
9. 👨‍👩‍👧 Family money talks — How to talk to parents about money
10. 🦋 Your money future — Building wealth as a woman in India

FORMAT RULES:
- SHORT messages. 2-4 sentences max per reply.
- Natural line breaks like real WhatsApp.
- End with quick reply options: [QR: option 1 | option 2 | option 3]
- Lessons: teaching moment → question or mini challenge.
- Correct answers: celebrate with emojis.
- Module complete: award [BADGE: badge name]
- Never give specific investment advice. Say "talk to a trusted adult" for big decisions.
- Never mention you are Claude or made by Anthropic. You are Diya from Daughters of India.`;

let history = [];
let busy = false;
let typEl = null;

const chatEl = () => document.getElementById('chat');
const now = () => { const d = new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
const scroll = () => setTimeout(() => chatEl().scrollTop = chatEl().scrollHeight, 40);
const wait = ms => new Promise(r => setTimeout(r, ms));

function parseText(t) {
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\n/g,'<br>');
  return t;
}
function extractQR(text) {
  const m = text.match(/\[QR:\s*([^\]]+)\]/);
  if (!m) return {text, qrs:[]};
  return {text:text.replace(m[0],'').trim(), qrs:m[1].split('|').map(s=>s.trim()).filter(Boolean)};
}
function extractBadge(text) {
  const m = text.match(/\[BADGE:\s*([^\]]+)\]/);
  if (!m) return {text, badge:null};
  return {text:text.replace(m[0],'').trim(), badge:m[1].trim()};
}

function addBubble(text, who) {
  const row = document.createElement('div');
  row.className = 'row ' + who;
  if (who === 'sys') {
    const b = document.createElement('div');
    b.className = 'bubble sys-note';
    b.textContent = text;
    row.appendChild(b);
    chatEl().appendChild(row);
    scroll();
    return;
  }
  const {text:t1, badge} = extractBadge(text);
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + who;
  bubble.innerHTML = parseText(t1);
  if (badge) {
    const b = document.createElement('div');
    b.className = 'badge';
    b.textContent = '🏅 ' + badge;
    bubble.appendChild(b);
  }
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = now() + (who==='user'?' <span class="tick">✓✓</span>':'');
  row.appendChild(bubble);
  row.appendChild(meta);
  chatEl().appendChild(row);
  scroll();
}

function setQR(opts) {
  const bar = document.getElementById('qr-bar');
  bar.innerHTML = '';
  (opts||[]).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = opt;
    btn.onclick = () => { document.getElementById('txt').value = opt; send(); };
    bar.appendChild(btn);
  });
}

function showTyping() {
  typEl = document.createElement('div');
  typEl.className = 'typing';
  typEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatEl().appendChild(typEl);
  document.getElementById('hstatus').textContent = 'typing...';
  scroll();
}
function hideTyping() {
  if (typEl) { typEl.remove(); typEl = null; }
  document.getElementById('hstatus').textContent = 'online';
}

async function callAPI(messages, maxTokens=800) {
  const res = await fetch(API, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6', max_tokens:maxTokens, system:SYS, messages})
  });
  if (!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  return data?.content?.[0]?.text || "Ek second yaar! 😅 Try again?";
}

async function sendReply(raw) {
  hideTyping();
  history.push({role:'assistant', content:raw});
  const {text:cleaned, qrs} = extractQR(raw);
  const parts = cleaned.split(/\n\n+/).filter(p=>p.trim());
  for (let i=0; i<parts.length; i++) {
    if (i>0) await wait(520);
    addBubble(parts[i].trim(), 'bot');
  }
  setQR(qrs.length ? qrs : ['Tell me more 💡','Next module ➡️','Give me an example 📖']);
}

async function send(prefill) {
  if (busy) return;
  const txtEl = document.getElementById('txt');
  const msg = (prefill || txtEl.value).trim();
  if (!msg) return;
  txtEl.value = '';
  txtEl.style.height = 'auto';
  setQR([]);
  addBubble(msg, 'user');
  history.push({role:'user', content:msg});
  if (history.length > 24) history = history.slice(-24);
  busy = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const raw = await callAPI(history);
    await sendReply(raw);
  } catch(e) {
    hideTyping();
    addBubble("Oops, connection hiccup! 😅\nTry again in a sec, yaar?", 'bot');
    setQR(['Try again 🔄']);
  }
  busy = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('txt').addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,96)+'px';
});
document.getElementById('txt').addEventListener('keydown', e=>{
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function tick() {
  const d = new Date();
  document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
setInterval(tick,1000); tick();
document.getElementById('day-label').textContent = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];

window.addEventListener('load', () => {
  setTimeout(async () => {
    const sp = document.getElementById('splash');
    sp.style.opacity='0';
    setTimeout(()=>sp.style.display='none',400);
    await wait(700);
    busy=true;
    document.getElementById('send-btn').disabled=true;
    showTyping();
    try {
      const raw = await callAPI([{role:'user',content:'Hi! I just joined Daughters of India.'}], 350);
      history.push({role:'assistant',content:raw});
      await sendReply(raw);
    } catch {
      hideTyping();
      addBubble("Heyy! 💜 I'm Diya — your money-smart companion from Daughters of India!\n\nWhat's your name? And what do you want to learn about today? 😊",'bot');
      setQR(['My name is...','Show all modules 📚','Start with savings 🏦']);
    }
    busy=false;
    document.getElementById('send-btn').disabled=false;
  }, 2000);
});
</script>
</body>
</html>
